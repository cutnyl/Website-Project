<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="styleDefault.css">
    <link rel="stylesheet" href="styleRegister.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body class="register-page">
    <div id="header"></div>
    
    <div class="judul">
        <h1>
            Join The Clan
        </h1>
    </div>
    
    <div class ="main-background">
        <form id="registerForm" class="register-box">
           
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your Name" id ="name">
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="text" placeholder="Enter your Email" id="email">
            </div>

            <div class="input-group">
                <label>Gender</label>
               
                <div class="radio-group">
                    <div class = "radio-item">
                        <input type="radio" name="gender" id="female" value="Female"> 
                        <label for="female">Female</label> 
                    </div>

                    <div class = "radio-item">
                        <input type="radio" name="gender" id="male" value="Male"> 
                        <label for="male">Male</label> 
                    </div>
                </div>

            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="text" placeholder="Enter your Age" id ="age">
            </div>

            <div class="input-group">
                <label>Favorite Troops</label>
                <input type="text" placeholder="Enter your Favorite Troops" id ="troops">
            </div>

            <div class="input-group">
                <label>Why do you want to join?</label>
                <textarea placeholder="Tell us why do you want to join Clash of BANG Clan?" id="reason"></textarea>
            </div>

            <button type="submit">Register</button>
        </form>
    </div>
    
    <div id="footer"></div>
    <script src="Component.js"></script>
    <script src="register.js"></script>

    
</body>
</html>
